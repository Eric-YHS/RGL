<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>仅支持电脑端作答</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC",
          system-ui, sans-serif;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
        box-sizing: border-box;
        background:
          radial-gradient(circle at top, rgba(185, 220, 244, 0.92), rgba(126, 164, 191, 0.95)),
          linear-gradient(180deg, #cfe6f5 0%, #b1d0e6 52%, #d7ddc6 100%);
        color: rgba(255, 255, 255, 0.94);
      }

      .card {
        width: min(560px, 100%);
        padding: 28px 26px;
        border-radius: 24px;
        background: rgba(14, 22, 38, 0.84);
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow: 0 24px 64px rgba(9, 14, 24, 0.3);
        backdrop-filter: blur(14px);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(227, 69, 69, 0.16);
        color: #ffd1d1;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 16px 0 12px;
        font-size: clamp(28px, 4vw, 38px);
        line-height: 1.08;
      }

      p {
        margin: 0;
        font-size: 16px;
        line-height: 1.7;
        color: rgba(255, 255, 255, 0.78);
      }

      .tips {
        margin-top: 18px;
        display: grid;
        gap: 10px;
        padding: 16px 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 244, 232, 0.92);
        font-size: 15px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">访问受限</div>
      <h1>本实验仅支持电脑端作答</h1>
      <p>
        检测到您当前正在使用手机或平板访问。本实验需要在电脑浏览器中完成，以保证页面布局、操作方式和实验记录一致。
      </p>
      <div class="tips">
        <div>请改用电脑打开当前链接后再继续。</div>
        <div>推荐使用 Chrome、Edge 或 Safari 的桌面浏览器。</div>
      </div>
    </main>
  </body>
</html>
